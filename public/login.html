<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: 'Times New Roman', Times, serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #F7F4EF;
        overflow: hidden;
    }

    .background {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url(https://img.freepik.com/premium-photo/cat-dog-are-cuddling-together-one-them-is-sleeping_662214-571287.jpg) no-repeat center/cover;
        filter: blur(12px);
        z-index: -1;
    }

    .card {
        display: flex;
        width: 850px;
        height: 480px;
        background: #F7F4EF;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        padding: 15px;
        gap: 15px; 
    }

    /* LEFT IMAGE FIXED */
    .card-left {
        width: 50%;
        background: url(https://img.freepik.com/premium-photo/cat-dog-are-cuddling-together-one-them-is-sleeping_662214-571287.jpg) no-repeat center/cover;
        border-radius: 10px;
    }

    .card-right {
        width: 50%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    /* BIGGER TEXT */
    .brand {
        font-family: cursive;
        color: #4A90E2;
        margin-bottom: 10px;
        font-size: 32px;
    }

    .card-right h2 {
        font-family: "Times New Roman", serif;
        color: #1F3A5F;
        margin-bottom: 25px;
        font-size: 28px;
    }

    form {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 300px;
    }

    input {
        margin-bottom: 15px;
        padding: 12px;
        border: 1px solid #6B7280;
        border-radius: 6px;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border-color: #4A90E2;
    }

    button {
        padding: 12px;
        border: none;
        background: #4A90E2;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #1F3A5F;
    }

    .signup-text {
        margin-top: 15px;
        font-size: 0.9em;
        color: #6B7280;
    }

    .signup-text a {
        color: #1F3A5F;
        text-decoration: none;
        font-weight: bold;
    }

    .signup-text a:hover {
        text-decoration: underline;
    }
</style>

<body>
    <div class="background"></div>
        <div class="card">
        <div class="card-left"></div>
            <div class="card-right">
                <div class="brand">Welcome</div>
                <h2>Login to your account</h2>

                <form id="loginForm">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>

                <br>
                <p class="signup-text">Don't have an account?
                    <a href="signUp.html">Sign up here</a>
                </p>
        </div>
    </div>
</body>

<script type="module">
    import { login } from "./auth.js";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            await login(email, password);
            localStorage.setItem("isLoggedIn", "true"); 
            alert("Login successful!");
            window.location.href = "index.html";
        } catch (error) {
            alert("Login failed: " + error.message);
        }
    });
</script>
</html>
